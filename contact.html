    <main>
      <section id="contact">
        <div class="container">
          <h2>Contact Me</h2>
          <div class="contact-info">
            <div class="contact-item">
              <h3>Phone</h3>
              <p>8675724959</p>
            </div>
            <div class="contact-item">
              <h3>Email</h3>
              <p>
                <a href="mailto:sabithra.m2024cse@sece.ac.in"
                  >sabithra.m2024cse@sece.ac.in</a
                >
              </p>
            </div>
            <div class="contact-item">
              <h3>LinkedIn</h3>
              <p>
                <a
                  href="https://www.linkedin.com/in/sabithra-m-430751337/"
                  target="_blank"
                  >linkedin.com/in/sabithra-m-430751337</a
                >
              </p>
            </div>
            <div class="contact-item">
              <h3>GitHub</h3>
              <p>
                <a href="https://github.com/Sabithra-777" target="_blank"
                  >github.com/Sabithra-777</a
                >
              </p>
            </div>
          </div>
          <div class="contact-form">
            <h3>Send a Message</h3>
            <form action="#" method="post">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea
                  id="message"
                  name="message"
                  rows="5"
                  required
                ></textarea>
              </div>
              <button type="submit" class="btn">Send Message</button>
            </form>
          </div>
        </div>
      </section>
